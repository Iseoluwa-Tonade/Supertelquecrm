<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM Project Board</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-strong: #f1f4f8;
      --line: #d9e0e8;
      --text: #1f2933;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --amber: #b45309;
      --rose: #be123c;
      --blue: #2563eb;
      --green: #15803d;
      --shadow: 0 12px 30px rgba(15, 23, 42, .08);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      min-height: 34px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover { border-color: #a7b4c3; }
    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    button.primary:hover { background: var(--accent-strong); }
    button.icon {
      width: 34px;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .app {
      display: grid;
      grid-template-columns: 236px minmax(0, 1fr) 340px;
      height: 100vh;
    }

    .sidebar {
      background: #202a36;
      color: #e7edf4;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 6px 10px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }

    .mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }
    .mark img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      display: block;
    }

    .brand strong { display: block; font-size: 15px; }
    .brand span { display: block; color: #aeb9c8; font-size: 12px; margin-top: 2px; }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav button {
      border: 0;
      background: transparent;
      color: #cbd5e1;
      border-radius: 6px;
      text-align: left;
      padding: 9px 10px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .nav svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .nav button.active,
    .nav button:hover {
      background: rgba(255,255,255,.09);
      color: #fff;
    }

    .sidebar-footer {
      margin-top: auto;
      display: grid;
      gap: 10px;
    }

    .metric {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius);
      padding: 12px;
    }
    .metric span { color: #aeb9c8; font-size: 12px; }
    .metric strong { display: block; margin-top: 6px; font-size: 20px; }

    .main {
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      min-width: 0;
      border-right: 1px solid var(--line);
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .search {
      position: relative;
      min-width: 260px;
    }
    .search input {
      width: 100%;
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--line);
      padding: 0 10px 0 34px;
      background: var(--panel-strong);
      color: var(--text);
    }
    .search svg {
      position: absolute;
      left: 10px;
      top: 9px;
      color: var(--muted);
    }

    .toolbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .segmented {
      display: inline-grid;
      grid-auto-flow: column;
      border: 1px solid var(--line);
      border-radius: 7px;
      overflow: hidden;
      background: var(--panel-strong);
    }
    .segmented button {
      border: 0;
      border-radius: 0;
      min-height: 32px;
      padding: 0 12px;
      background: transparent;
      color: var(--muted);
    }
    .segmented button.active {
      background: #fff;
      color: var(--text);
      box-shadow: inset 0 -2px 0 var(--accent);
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .authbar {
      background: #eef6f5;
      border-bottom: 1px solid var(--line);
      padding: 10px 18px;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .authbar strong {
      display: block;
      font-size: 13px;
    }
    .authbar span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }
    .auth-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .auth-controls input {
      width: 190px;
      height: 34px;
      padding: 0 9px;
    }
    select {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 8px;
      background: #fff;
      color: var(--text);
    }

    .board {
      padding: 16px 18px;
      overflow: auto;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(250px, 1fr);
      gap: 14px;
      align-items: start;
    }

    .overview {
      padding: 16px 18px;
      overflow: auto;
      display: grid;
      gap: 14px;
      align-content: start;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
    }
    .kpi {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      min-width: 0;
    }
    .kpi span {
      color: var(--muted);
      font-size: 12px;
      display: block;
    }
    .kpi strong {
      display: block;
      margin-top: 7px;
      font-size: 24px;
      line-height: 1;
    }
    .journey {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .journey h2,
    .activity-panel h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }
    .journey-steps {
      display: grid;
      grid-template-columns: repeat(9, minmax(82px, 1fr));
      gap: 8px;
    }
    .journey-step {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 8px;
      min-height: 72px;
      display: grid;
      align-content: space-between;
      gap: 8px;
      background: var(--panel-strong);
    }
    .journey-step strong {
      font-size: 18px;
    }
    .journey-step span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }
    .overview-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(300px, .85fr);
      gap: 14px;
    }
    .activity-panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .activity-form {
      display: grid;
      grid-template-columns: 1fr 130px 92px;
      gap: 8px;
    }
    .activity-list {
      display: grid;
      gap: 8px;
    }
    .activity-item {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 9px;
      align-items: start;
    }
    .activity-item input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
    }
    .activity-item strong {
      font-size: 13px;
      display: block;
    }
    .activity-item span {
      color: var(--muted);
      display: block;
      margin-top: 3px;
      font-size: 12px;
    }
    .activity-item.done strong {
      text-decoration: line-through;
      color: var(--muted);
    }
    .mini-delete {
      width: 28px;
      min-height: 28px;
      color: var(--rose);
    }

    .column {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 300px;
      display: grid;
      grid-template-rows: auto minmax(120px, 1fr);
    }

    .column-head {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      min-width: 0;
    }
    .column-head h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex: 0 0 auto;
    }
    .count {
      color: var(--muted);
      background: #fff;
      border: 1px solid var(--line);
      min-width: 28px;
      height: 24px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 12px;
    }

    .lane {
      padding: 10px;
      display: grid;
      gap: 10px;
      align-content: start;
      min-height: 260px;
    }

    .lane.drag-over {
      outline: 2px solid rgba(15, 118, 110, .35);
      outline-offset: -7px;
      background: rgba(15, 118, 110, .04);
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: 0 1px 0 rgba(15,23,42,.03);
      cursor: grab;
      min-width: 0;
    }
    .card:active { cursor: grabbing; }
    .card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(15,118,110,.16);
    }
    .card h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .card .company {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 11px;
      align-items: center;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 23px;
      border-radius: 12px;
      padding: 0 8px;
      font-size: 12px;
      background: #eef2f7;
      color: #405266;
      white-space: nowrap;
    }
    .priority-high { background: #fff1f2; color: var(--rose); }
    .priority-medium { background: #fffbeb; color: var(--amber); }
    .priority-low { background: #ecfdf5; color: var(--green); }
    .value { font-weight: 700; font-size: 13px; color: var(--text); }

    .side {
      background: var(--panel);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
    }

    .side-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .side-head h2 { margin: 0; font-size: 16px; }

    .detail {
      padding: 16px;
      overflow: auto;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 16px;
      line-height: 1.45;
      font-size: 14px;
    }
    .empty button {
      margin-top: 12px;
      padding: 0 10px;
    }

    .form {
      display: grid;
      gap: 12px;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 9px;
      color: var(--text);
      background: #fff;
    }
    textarea {
      min-height: 84px;
      resize: vertical;
      line-height: 1.4;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding-top: 4px;
    }
    .danger { color: var(--rose); border-color: #fecdd3; }

    .insights {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }
    .insight {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .insight-top {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
    }
    .bar {
      height: 7px;
      background: #e6edf4;
      border-radius: 7px;
      overflow: hidden;
    }
    .bar span {
      display: block;
      height: 100%;
      background: var(--accent);
      width: var(--w);
    }

    .toast {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #111827;
      color: #fff;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 13px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1120px) {
      .app { grid-template-columns: 74px minmax(0, 1fr); }
      .sidebar { padding: 14px 10px; }
      .brand div:not(.mark), .nav span, .sidebar-footer { display: none; }
      .nav button { justify-content: center; padding: 10px; }
      .side {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        width: min(360px, 100vw);
        box-shadow: var(--shadow);
        transform: translateX(100%);
        transition: .2s ease;
        z-index: 5;
      }
      .side.open { transform: translateX(0); }
    }

    @media (max-width: 760px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      .sidebar {
        position: sticky;
        top: 0;
        z-index: 4;
        flex-direction: row;
        align-items: center;
        padding: 10px;
      }
      .brand { border: 0; padding: 0; }
      .nav {
        grid-auto-flow: column;
        overflow-x: auto;
        flex: 1;
      }
      .nav button { min-width: 42px; }
      .main { min-height: calc(100vh - 54px); border-right: 0; }
      header, .toolbar {
        align-items: stretch;
        flex-direction: column;
      }
      .authbar {
        grid-template-columns: 1fr;
      }
      .auth-controls {
        justify-content: stretch;
      }
      .auth-controls input,
      .auth-controls button {
        flex: 1 1 140px;
      }
      .actions, .filters {
        width: 100%;
        flex-wrap: wrap;
      }
      .search { min-width: 0; flex: 1 1 190px; }
      .board {
        grid-auto-columns: minmax(248px, 86vw);
        padding: 12px;
      }
      .overview { padding: 12px; }
      .kpi-grid,
      .overview-grid {
        grid-template-columns: 1fr;
      }
      .journey-steps {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
      .activity-form {
        grid-template-columns: 1fr;
      }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Workspace navigation">
      <div class="brand">
        <div class="mark"><img src="supertelque-logo.png" alt="SuperTelque"></div>
        <div>
          <strong>SuperTelque CRM</strong>
          <span>Client journey and delivery</span>
        </div>
      </div>
      <nav class="nav">
        <button class="active" data-view="overview" title="Overview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="8"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="15" width="7" height="6"></rect></svg><span>Overview</span>
        </button>
        <button data-view="pipeline" title="Pipeline">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h16"></path><path d="M9 5v14M15 5v14"></path></svg><span>Pipeline</span>
        </button>
        <button data-view="projects" title="Projects">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg><span>Projects</span>
        </button>
        <button data-view="activity" title="Activity">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M8 6h13"></path><path d="M8 12h13"></path><path d="M8 18h13"></path><path d="M3 6h.01"></path><path d="M3 12h.01"></path><path d="M3 18h.01"></path></svg><span>Activity</span>
        </button>
        <button data-view="focus" title="Focus">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="8"></circle><circle cx="12" cy="12" r="3"></circle></svg><span>Focus</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="metric">
          <span>Open value</span>
          <strong id="totalValue">$0</strong>
        </div>
        <div class="metric">
          <span>Due this week</span>
          <strong id="dueWeek">0</strong>
        </div>
      </div>
    </aside>

    <main class="main">
      <header>
        <div class="title">
          <h1 id="viewTitle">Revenue Pipeline</h1>
          <p id="viewSubtitle">Track deals, projects, next actions, and owner accountability.</p>
        </div>
        <div class="actions">
          <div class="search">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path>
            </svg>
            <input id="search" type="search" placeholder="Search account, owner, task">
          </div>
          <button class="primary" id="addBtn">+ New</button>
        </div>
      </header>

      <section class="toolbar" aria-label="Board controls">
        <div class="segmented" role="tablist" aria-label="Item type">
          <button class="active" data-type="all">All</button>
          <button data-type="deal">Deals</button>
          <button data-type="project">Projects</button>
          <button data-type="task">Tasks</button>
        </div>
        <div class="filters">
          <select id="ownerFilter" aria-label="Owner filter"></select>
          <select id="priorityFilter" aria-label="Priority filter">
            <option value="all">All priorities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
      </section>

      <section class="authbar" id="authbar" aria-label="Supabase connection">
        <div>
          <strong id="authStatus">Connecting to CRM database</strong>
          <span id="authHint">Sign in to save cards, sync changes, and use the dedicated CRM database.</span>
        </div>
        <div class="auth-controls" id="authControls">
          <input id="authEmail" type="email" placeholder="Email">
          <input id="authPassword" type="password" placeholder="Password">
          <button id="signInBtn">Sign in</button>
          <button class="primary" id="signUpBtn">Create account</button>
          <button id="signOutBtn" hidden>Sign out</button>
        </div>
      </section>

      <section class="board" id="board" aria-label="CRM project board"></section>
    </main>

    <aside class="side" id="sidePanel" aria-label="Selected item details">
      <div class="side-head">
        <h2 id="sideTitle">Details</h2>
        <button class="icon" id="closeSide" title="Close">&times;</button>
      </div>
      <div class="detail" id="detail"></div>
    </aside>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://otpzsnsrxcfuysjfnguk.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_l352tRKAwJS8Dw0m4JRgPA_X9gndbC7";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    const pipelineColumns = [
      { id: "responded_email", title: "Responded to Email", color: "#2563eb" },
      { id: "meeting_booked", title: "Meeting Booked", color: "#0f766e" },
      { id: "meeting_done", title: "Meeting Done", color: "#0891b2" },

    function columns() {
      return state.view === "projects" ? projectColumns : pipelineColumns;
    }

    function isDemoMode() {
      return !state.session;
    }

    function visibleItems() {
      return isDemoMode() ? seedItems : state.items;
    }

    function visibleActivities() {
      return isDemoMode() ? demoActivities : state.activities;
    }

    function currentRole() {
      return state.profile?.role || (state.session ? "owner" : "demo");
    }

    function isManager() {
      return currentRole() === "manager";
    }

    function normalizeStatus(item) {
      const available = columns().map(column => column.id);
      if (available.includes(item.status)) return item.status;
      if (state.view === "projects") return item.type === "project" ? "active" : "backlog";
      return item.type === "deal" ? "discovery_call" : "responded_email";
    }

    function filteredItems() {
      const query = state.search.trim().toLowerCase();
      return visibleItems().filter(item => {
        const typeOk = state.type === "all" || item.type === state.type;
        const ownerOk = state.owner === "all" || item.owner === state.owner;
        const priorityOk = state.priority === "all" || item.priority === state.priority;
        const viewOk = state.view !== "focus" || item.priority === "high" || daysUntil(item.due) <= 7;
        const text = [item.title, item.company, item.owner, item.notes, item.type].join(" ").toLowerCase();
        return typeOk && ownerOk && priorityOk && viewOk && (!query || text.includes(query));
      });
    }

    function render() {
      renderChrome();
      renderAuth();
      renderFilters();
      renderBoard();
      renderMetrics();

        button.classList.toggle("active", button.dataset.view === state.view);

      document.querySelectorAll(".segmented button").forEach(button => {
        button.classList.toggle("active", button.dataset.type === state.type);
      });

    function renderAuth() {
      const signedIn = Boolean(state.session);
      authEmail.hidden = signedIn;
      authPassword.hidden = signedIn;
      signInBtn.hidden = signedIn;
      signUpBtn.hidden = signedIn;
      signOutBtn.hidden = !signedIn;
      document.getElementById("addBtn").disabled = !signedIn;

      if (state.loading) {
        authStatus.textContent = "Connecting to CRM database";
        authHint.textContent = "Loading Supabase session and board data.";
        return;
      }

      if (signedIn) {
        authStatus.textContent = `Signed in as ${state.session.user.email}`;
        authHint.textContent = `Role: ${label(currentRole())}. ${isManager() ? "Manager overview can read the team pipeline." : "Live cards and activities are saved to your dashboard."}`;

        authStatus.textContent = "Demo mode - sign in for live data";
        authHint.textContent = "The dashboard below uses frontend dummy data. Sign in before real CRM tables read or write.";

      const owners = Array.from(new Set(visibleItems().map(item => item.owner))).sort();
      ownerFilter.innerHTML = `<option value="all">All owners</option>` + owners.map(owner => (
        `<option value="${escapeHtml(owner)}">${escapeHtml(owner)}</option>`
      )).join("");
      ownerFilter.value = state.owner;
      priorityFilter.value = state.priority;
    }

    function renderBoard() {
      if (state.loading) {
        board.innerHTML = `<div class="empty">Loading the CRM database...</div>`;
        return;
      }

      if (state.view === "overview") {
        renderOverview();
        return;
      }

      if (state.view === "activity") {
        renderActivityView();
        return;
      }

      const items = filteredItems();
      const activeColumns = state.view === "focus" ? [
        { id: "overdue", title: "Overdue", color: "#be123c" },
        { id: "soon", title: "Next 7 days", color: "#b45309" },
        { id: "later", title: "Later", color: "#0f766e" }
      ] : columns();

      board.innerHTML = activeColumns.map(column => {
        const columnItems = items.filter(item => itemColumn(item) === column.id);
        return `
          <article class="column">
            <div class="column-head">
              <h2><span class="dot" style="background:${column.color}"></span>${column.title}</h2>
              <span class="count">${columnItems.length}</span>
            </div>
            <div class="lane" data-status="${column.id}">
              ${columnItems.map(renderCard).join("")}
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => selectItem(card.dataset.id));
        card.addEventListener("dragstart", event => {
          event.dataTransfer.setData("text/plain", card.dataset.id);
        });
      });

      document.querySelectorAll(".lane").forEach(lane => {
        lane.addEventListener("dragover", event => {

          event.preventDefault();
          lane.classList.add("drag-over");

        lane.addEventListener("dragleave", () => lane.classList.remove("drag-over"));
        lane.addEventListener("drop", event => {
          event.preventDefault();
          lane.classList.remove("drag-over");
          moveItem(event.dataTransfer.getData("text/plain"), lane.dataset.status);
        });
      });

        .filter(item => !["project_done", "done", "won"].includes(item.status))

                return `<div class="journey-step"><strong>${count}</strong><span>${step.title}</span></div>`;
              }).join("")}

            <div class="activity-panel">
              <h2>Recently Active</h2>
              <div class="activity-list">
                ${items.slice(0, 6).map(item => `
                  <div class="activity-item">
                    <span class="dot" style="background:${statusColor(item.status)}"></span>
                    <div><strong>${escapeHtml(item.company)}</strong><span>${escapeHtml(item.title)} - ${statusTitle(item.status)}</span></div>
                    <span class="value">${item.value ? money(item.value) : dueLabel(item.due)}</span>

            <div class="activity-panel">
              <h2>Today</h2>
              ${renderActivityComposer()}

        </section>

      bindActivityControls();

    function renderActivityView() {
      const grouped = visibleActivities().reduce((groups, activity) => {
        const key = activity.activity_date || todayIso();
        groups[key] ||= [];
        groups[key].push(activity);
        return groups;
      }, {});

      board.innerHTML = `
        <section class="overview" aria-label="Daily activity tracking">
          <div class="activity-panel">
            <h2>New Activity</h2>
            ${renderActivityComposer()}

          ${Object.keys(grouped).sort().reverse().map(date => `
            <div class="activity-panel">
              <h2>${dateLabel(date)}</h2>
              <div class="activity-list">${renderActivityItems(grouped[date], !isDemoMode())}</div>
            </div>
          `).join("") || `<div class="empty">No daily activities yet. Add your first email, call, meeting, or delivery task.</div>`}
        </section>
      `;
      bindActivityControls();

    function renderKpi(labelText, value) {
      return `<div class="kpi"><span>${labelText}</span><strong>${value}</strong></div>`;
    }

    function renderActivityComposer() {
      return `
        <form class="activity-form" id="activityForm">
          <input name="title" placeholder="${isDemoMode() ? "Sign in to save daily activity" : "Daily activity"}" ${isDemoMode() ? "disabled" : ""}>
          <select name="channel" ${isDemoMode() ? "disabled" : ""}>
            ${["email", "call", "meeting", "proposal", "delivery", "admin", "general"].map(value => option(value, "general")).join("")}
          </select>
          <button class="primary" type="submit" ${isDemoMode() ? "disabled" : ""}>Add</button>
        </form>
      `;
    }

    function renderActivityItems(activities, editable) {
      return activities.map(activity => `
        <div class="activity-item ${activity.completed ? "done" : ""}" data-activity-id="${activity.id}">
          <input type="checkbox" ${activity.completed ? "checked" : ""} ${editable ? "" : "disabled"} aria-label="Mark complete">
          <div><strong>${escapeHtml(activity.title)}</strong><span>${label(activity.channel)} - ${dateLabel(activity.activity_date)}</span></div>
          ${editable ? `<button class="mini-delete" type="button" title="Delete activity">&times;</button>` : ""}
        </div>
      `).join("") || `<div class="empty">No activities for this day yet.</div>`;
    }

    function bindActivityControls() {
      const form = document.getElementById("activityForm");
      if (form) form.addEventListener("submit", addActivity);
      document.querySelectorAll(".activity-item[data-activity-id] input[type='checkbox']").forEach(input => {
        input.addEventListener("change", event => toggleActivity(event.currentTarget.closest(".activity-item").dataset.activityId, event.currentTarget.checked));
      });
      document.querySelectorAll(".activity-item[data-activity-id] .mini-delete").forEach(button => {
        button.addEventListener("click", event => deleteActivity(event.currentTarget.closest(".activity-item").dataset.activityId));
      });
    }

    function itemColumn(item) {
      if (state.view === "focus") {
        const days = daysUntil(item.due);
        if (days < 0) return "overdue";
        if (days <= 7) return "soon";
        return "later";
      }
      return normalizeStatus(item);
    }

    function renderCard(item) {
      const selected = item.id === state.selectedId ? " selected" : "";
      return `
        <article class="card${selected}" draggable="true" data-id="${item.id}">
          <h3>${escapeHtml(item.title)}</h3>
          <div class="company">${escapeHtml(item.company)} &middot; ${escapeHtml(item.owner)}</div>
          <div class="card-row">
            <span class="pill priority-${item.priority}">${label(item.priority)}</span>
            <span class="value">${item.value ? money(item.value) : dueLabel(item.due)}</span>
          </div>
          <div class="card-row">
            <span class="pill">${label(item.type)}</span>
            <span class="pill">${dueLabel(item.due)}</span>
          </div>
        </article>
      `;
    }

    function renderMetrics() {
      const items = visibleItems();
      const openValue = items
        .filter(item => !["won", "done", "project_done"].includes(item.status))
        .reduce((sum, item) => sum + Number(item.value || 0), 0);
      document.getElementById("totalValue").textContent = money(openValue);
      document.getElementById("dueWeek").textContent = items.filter(item => daysUntil(item.due) <= 7).length;
    }

    function renderDetail() {
      const item = visibleItems().find(candidate => candidate.id === state.selectedId);
      if (!state.session) {
        sideTitle.textContent = "Details";
        detail.innerHTML = `<div class="empty">You are viewing demo data. Sign in to read live CRM tables, edit cards, and save daily activities. Your real data is protected by Supabase Auth and row-level security.</div>`;
        return;
      }

      if (!item) {
        sideTitle.textContent = "Details";
        detail.innerHTML = `
          <div class="insights">
            ${renderInsight("Pipeline health", completionPercent("project_done", pipelineColumns), "Completed project value")}
            ${renderInsight("Delivery health", completionPercent("project_done", projectColumns), "Completed project value")}
            ${renderInsight("Urgent load", urgentPercent(), "High priority or due soon")}
          </div>
          <div class="empty">
            Select a card to edit account details, ownership, priority, due date, value, and notes.
            ${visibleItems().length ? "" : `<button class="primary" id="seedBtn">Load sample cards</button>`}
          </div>

        const seedBtn = document.getElementById("seedBtn");

      sidePanel.classList.add("open");
      sideTitle.textContent = item.company;
      detail.innerHTML = `
        <form class="form" id="itemForm">
          <label>Title<input name="title" value="${escapeAttr(item.title)}"></label>
          <label>Company<input name="company" value="${escapeAttr(item.company)}"></label>
          <div class="form-grid">
            <label>Owner<input name="owner" value="${escapeAttr(item.owner)}"></label>
            <label>Type
              <select name="type">
                ${["deal", "project", "task"].map(value => option(value, item.type)).join("")}
              </select>
            </label>
          </div>
          <div class="form-grid">
            <label>Priority
              <select name="priority">
                ${["high", "medium", "low"].map(value => option(value, item.priority)).join("")}
              </select>
            </label>
            <label>Status
              <select name="status">
                ${columns().map(column => option(column.id, normalizeStatus(item), column.title)).join("")}

          </div>
          <div class="form-grid">
            <label>Value<input name="value" type="number" min="0" step="100" value="${Number(item.value || 0)}"></label>
            <label>Due date<input name="due" type="date" value="${escapeAttr(item.due)}"></label>
          </div>
          <label>Notes<textarea name="notes">${escapeHtml(item.notes)}</textarea></label>
          <div class="form-actions">
            <button type="button" class="danger" id="deleteBtn">Delete</button>
            <button type="submit" class="primary">Save</button>
          </div>
        </form>
      `;

      document.getElementById("itemForm").addEventListener("submit", saveSelectedFromForm);
      document.getElementById("deleteBtn").addEventListener("click", deleteSelected);
    }

    function renderInsight(title, percent, caption) {
      return `
        <div class="insight">
          <div class="insight-top"><strong>${title}</strong><span>${percent}%</span></div>
          <div class="bar"><span style="--w:${percent}%"></span></div>
          <div class="insight-top"><span>${caption}</span></div>
        </div>
      `;
    }

    function completionPercent(doneStatus) {
      const items = visibleItems();
      const total = items.reduce((sum, item) => sum + Number(item.value || 0), 0) || 1;
      const done = items.filter(item => item.status === doneStatus).reduce((sum, item) => sum + Number(item.value || 0), 0);
      return Math.round((done / total) * 100);
    }

    function urgentPercent() {
      const items = visibleItems();
      if (!items.length) return 0;
      const urgent = items.filter(item => item.priority === "high" || daysUntil(item.due) <= 7).length;
      return Math.round((urgent / items.length) * 100);
    }

    async function loadRemoteItems() {
      if (!state.session) {
        state.items = [];
        return;
      }

      const { data, error } = await supabaseClient
        .from("crm_board_items")
        .select("id,user_id,assigned_to,visibility,type,title,company,owner,priority,value,due,status,notes,created_at,updated_at")
        .order("created_at", { ascending: false });

      if (error) throw error;
      state.items = data || [];
    }

    async function loadProfile() {
      if (!state.session) {
        state.profile = null;
        return;
      }

      const fallback = {
        user_id: state.session.user.id,
        email: state.session.user.email,
        role: state.session.user.email?.toLowerCase() === "iseolu6@gmail.com" ? "manager" : "owner",
        display_name: state.session.user.email?.split("@")[0] || "User",
        status: "active"
      };

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("user_id,email,role,display_name,status")
        .eq("user_id", state.session.user.id)
        .single();

      if (error) {
        state.profile = fallback;
        return;
      }
      state.profile = data || fallback;
    }

    async function loadRemoteActivities() {
      if (!state.session) {
        state.activities = [];
        return;
      }

      const { data, error } = await supabaseClient
        .from("crm_daily_activities")
        .select("id,board_item_id,activity_date,title,channel,notes,completed,created_at,updated_at")
        .order("activity_date", { ascending: false })
        .order("created_at", { ascending: false })
        .limit(80);

      if (error) throw error;
      state.activities = data || [];
    }

    async function seedDatabase() {
      if (!state.session) return;
      const rows = seedItems.map(({ id, ...item }) => item);
      const { data, error } = await supabaseClient
        .from("crm_board_items")
        .insert(rows)
        .select("id,type,title,company,owner,priority,value,due,status,notes,created_at,updated_at");

      if (error) {
        flash(error.message);
        return;
      }
      state.items = data || [];
      render();
      flash("Sample cards loaded");
    }

    async function addActivity(event) {
      event.preventDefault();
      if (!state.session) {
        flash("Sign in to save activity");
        return;
      }
      const form = new FormData(event.currentTarget);
      const title = form.get("title").trim();
      if (!title) {
        flash("Add an activity title");
        return;
      }

      const { data, error } = await supabaseClient
        .from("crm_daily_activities")
        .insert({
          title,
          channel: form.get("channel"),
          activity_date: todayIso(),
          completed: false
        })
        .select("id,board_item_id,activity_date,title,channel,notes,completed,created_at,updated_at")
        .single();

      if (error) {
        flash(error.message);
        return;
      }

      state.activities.unshift(data);
      render();
      flash("Activity added");
    }

    async function toggleActivity(id, completed) {
      if (!state.session) {
        flash("Sign in to update activity");
        return;
      }
      const { data, error } = await supabaseClient
        .from("crm_daily_activities")
        .update({ completed })
        .eq("id", id)
        .select("id,board_item_id,activity_date,title,channel,notes,completed,created_at,updated_at")
        .single();

      if (error) {
        flash(error.message);
        return;
      }

      state.activities = state.activities.map(activity => activity.id === id ? data : activity);
      render();
    }

    async function deleteActivity(id) {
      if (!state.session) {
        flash("Sign in to delete activity");
        return;
      }
      const { error } = await supabaseClient
        .from("crm_daily_activities")
        .delete()
        .eq("id", id);

      if (error) {
        flash(error.message);
        return;
      }

      state.activities = state.activities.filter(activity => activity.id !== id);
      render();
      flash("Activity deleted");
    }

    async function saveSelectedFromForm(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const patch = {
        title: form.get("title").trim(),
        company: form.get("company").trim(),
        owner: form.get("owner").trim(),
        type: form.get("type"),
        priority: form.get("priority"),
        status: form.get("status"),
        value: Number(form.get("value") || 0),
        due: form.get("due") || null,
        notes: form.get("notes").trim()
      };
      const { data, error } = await supabaseClient
        .from("crm_board_items")
        .update(patch)
        .eq("id", state.selectedId)
        .select("id,user_id,assigned_to,visibility,type,title,company,owner,priority,value,due,status,notes,created_at,updated_at")
        .single();

      if (error) {
        flash(error.message);
        return;
      }

      state.items = state.items.map(item => item.id === state.selectedId ? data : item);
      render();
      flash("Saved");
    }

    async function deleteSelected() {
      const id = state.selectedId;
      const { error } = await supabaseClient
        .from("crm_board_items")
        .delete()
        .eq("id", id);

      if (error) {
        flash(error.message);
        return;
      }

      state.items = state.items.filter(item => item.id !== id);
      state.selectedId = null;
      render();
      flash("Deleted");
    }

    async function moveItem(id, status) {
      const { data, error } = await supabaseClient
        .from("crm_board_items")
        .update({ status })
        .eq("id", id)
        .select("id,user_id,assigned_to,visibility,type,title,company,owner,priority,value,due,status,notes,created_at,updated_at")
        .single();

      if (error) {
        flash(error.message);
        return;
      }

      state.items = state.items.map(item => item.id === id ? data : item);
      state.selectedId = id;
      render();
      flash("Moved");
    }

    function selectItem(id) {
      state.selectedId = id;
      render();
    }

    async function addItem() {
      if (!state.session) {
        flash("Sign in first");
        return;
      }
      const status = state.view === "projects" ? "backlog" : "responded_email";
      const item = {
        user_id: state.session.user.id,
        assigned_to: state.session.user.id,
        visibility: "personal",
        type: state.type === "all" ? "deal" : state.type,
        title: "New opportunity",
        company: "New account",
        owner: "Ava",
        priority: "medium",
        value: 0,
        due: new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10),
        status,
        notes: ""
      };

      const { data, error } = await supabaseClient
        .from("crm_board_items")
        .insert(item)
        .select("id,user_id,assigned_to,visibility,type,title,company,owner,priority,value,due,status,notes,created_at,updated_at")
        .single();

      if (error) {
        flash(error.message);
        return;
      }

      state.items.unshift(data);
      state.selectedId = data.id;
      render();
      flash("Created");
    }

    function daysUntil(date) {
      const today = new Date();
      const midnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      return Math.ceil((new Date(date) - midnight) / 86400000);
    }

    function dueLabel(date) {
      const days = daysUntil(date);
      if (days < 0) return `${Math.abs(days)}d late`;
      if (days === 0) return "Today";
      if (days === 1) return "Tomorrow";
      return `${days}d`;
    }

    function money(value) {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(value);
    }

    function label(value) {
      return String(value).replace(/_/g, " ").replace(/\b\w/g, char => char.toUpperCase());
    }

    function option(value, selected, text = label(value)) {
      return `<option value="${escapeAttr(value)}" ${value === selected ? "selected" : ""}>${escapeHtml(text)}</option>`;
    }

    function statusTitle(status) {
      return [...pipelineColumns, ...projectColumns].find(column => column.id === status)?.title || label(status);
    }

    function statusColor(status) {
      return [...pipelineColumns, ...projectColumns].find(column => column.id === status)?.color || "#64748b";
    }

    function todayIso() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString().slice(0, 10);
    }

    function activitiesForToday() {
      return visibleActivities().filter(activity => activity.activity_date === todayIso());
    }

    function dateLabel(date) {
      if (date === todayIso()) return "Today";
      return date || "No date";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    function flash(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(flash.timer);
      flash.timer = setTimeout(() => toast.classList.remove("show"), 1300);
    }

    async function signIn() {
      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) {
        flash("Enter email and password");
        return;
      }

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) flash(error.message);
    }

    async function signUp() {
      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) {
        flash("Enter email and password");
        return;
      }

      const { error } = await supabaseClient.auth.signUp({ email, password });
      if (error) {
        flash(error.message);
        return;
      }
      flash("Account created. Check your email if confirmation is enabled.");
    }

    async function signOut() {
      await supabaseClient.auth.signOut();
    }

    async function refreshFromDatabase() {
      try {
        state.loading = true;
        render();
        await loadProfile();
        await loadRemoteItems();
        await loadRemoteActivities();
      } catch (error) {
        flash(error.message);
      } finally {
        state.loading = false;
        render();
      }
    }

    function subscribeToChanges() {
      if (state.realtimeChannel) {
        supabaseClient.removeChannel(state.realtimeChannel);
        state.realtimeChannel = null;
      }
      if (!state.session) return;

      state.realtimeChannel = supabaseClient
        .channel("crm_board_items_changes")
        .on("postgres_changes", { event: "*", schema: "public", table: "crm_board_items" }, () => {
          loadRemoteItems().then(render).catch(error => flash(error.message));
        })
        .on("postgres_changes", { event: "*", schema: "public", table: "crm_daily_activities" }, () => {
          loadRemoteActivities().then(render).catch(error => flash(error.message));
        })
        .subscribe();
    }

    async function initializeSupabase() {
      try {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        state.session = data.session;
        await loadProfile();
        await loadRemoteItems();
        await loadRemoteActivities();
        subscribeToChanges();
      } catch (error) {
        flash(error.message);
      } finally {
        state.loading = false;
        render();
      }

      supabaseClient.auth.onAuthStateChange(async (_event, session) => {
        state.session = session;
        state.selectedId = null;
        if (!session) {
          state.profile = null;
          state.items = [];
          state.activities = [];
        }
        subscribeToChanges();
        await refreshFromDatabase();
      });
    }

    document.querySelectorAll(".nav button").forEach(button => {
      button.addEventListener("click", () => {
        state.view = button.dataset.view;
        state.selectedId = null;
        render();
      });
    });

    document.querySelectorAll(".segmented button").forEach(button => {
      button.addEventListener("click", () => {
        state.type = button.dataset.type;
        render();
      });
    });

    searchInput.addEventListener("input", event => {
      state.search = event.target.value;
      renderBoard();
    });
    ownerFilter.addEventListener("change", event => {
      state.owner = event.target.value;
      renderBoard();
    });
    priorityFilter.addEventListener("change", event => {
      state.priority = event.target.value;
      renderBoard();
    });
    document.getElementById("addBtn").addEventListener("click", addItem);
    signInBtn.addEventListener("click", signIn);
    signUpBtn.addEventListener("click", signUp);
    signOutBtn.addEventListener("click", signOut);
    authPassword.addEventListener("keydown", event => {
      if (event.key === "Enter") signIn();
    });
    document.getElementById("closeSide").addEventListener("click", () => {
      state.selectedId = null;
      sidePanel.classList.remove("open");
      render();
    });

    initializeSupabase();
  </script>
</body>
</html>
